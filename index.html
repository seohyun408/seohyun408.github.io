<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Seohyun LEE</title>
    <meta name="description" content="Seohyun LEE — Language AI, Applied AI" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;600;700&family=IBM+Plex+Sans:wght@400;600;700&family=Source+Serif+4:ital,opsz,wght@0,8..60,400;0,8..60,600;1,8..60,400&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <a class="skip-link" href="#main">본문으로 건너뛰기</a>
    <header class="site-header">
      <div class="wrap">
        <a class="brand" href="/">Seohyun LEE</a>
        <nav class="nav" aria-label="주요 메뉴">
          <a href="/">소개</a>
          <a href="https://github.com/seohyun408" rel="noopener noreferrer">GitHub</a>
        </nav>
      </div>
    </header>

    <main id="main">
      <section class="profile-section" aria-labelledby="profile-heading">
        <div class="wrap wrap-wide">
          <div class="profile-row">
            <div class="profile-photo">
              <img
                src="assets/images/profile.jpg"
                alt="Seohyun LEE"
                width="168"
                height="168"
                loading="eager"
                decoding="async"
                onerror="if (this.src.indexOf('profile.jpg') !== -1) { this.src='assets/images/profile.png'; } else if (this.src.indexOf('profile.png') !== -1) { this.src='assets/images/profile-placeholder.svg'; this.onerror=null; }"
              />
            </div>
            <div class="profile-details">
              <h1 id="profile-heading" class="profile-name">Seohyun LEE</h1>
              <p class="profile-line">
                <a class="profile-email" href="mailto:lsh2684360@yonsei.ac.kr">lsh2684360@yonsei.ac.kr</a>
              </p>
              <p class="profile-line profile-research">
                <span class="profile-label">Research Area</span>
                Language AI, Applied AI
              </p>
            </div>
          </div>
        </div>
      </section>

      <section class="section section-empty" aria-labelledby="education-heading">
        <div class="wrap wrap-wide">
          <h2 id="education-heading">Education</h2>
        </div>
      </section>

      <section class="section section-empty alt" aria-labelledby="project-heading">
        <div class="wrap wrap-wide">
          <h2 id="project-heading">Project</h2>
        </div>
      </section>

      <section class="section section-empty" aria-labelledby="work-heading">
        <div class="wrap wrap-wide">
          <h2 id="work-heading">Work Experience</h2>
        </div>
      </section>

      <section class="section section-empty alt" aria-labelledby="skills-heading">
        <div class="wrap wrap-wide">
          <h2 id="skills-heading">Skills</h2>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="wrap">
        <p>
          © Seohyun LEE ·
          <a href="https://seohyun408.github.io">seohyun408.github.io</a>
        </p>
      </div>
    </footer>
  </body>
</html>
